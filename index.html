<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UN-AD | 사기 전 꼭 봐야 할 단점 요약</title>
  <link href="/style.css" rel="stylesheet" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <p class="eyebrow">UN-AD LINK INSIGHT</p>
      <h1>쿠팡 링크 붙여넣기만 하면<br/>1~2점 리뷰 단점만 요약</h1>
      <p class="subtitle">상품 링크를 넣으면 저평점 리뷰를 자동 수집/분석해서 구매 전 확인해야 할 단점만 정리해줍니다.</p>
    </header>

    <section class="panel input-panel">
      <label for="productLink" class="input-label">쿠팡 상품 링크</label>
      <div class="link-row">
        <input id="productLink" type="url" placeholder="https://www.coupang.com/vp/products/131023672?itemId=...&vendorItemId=..." />
        <button id="summarizeBtn" class="btn primary">단점 요약하기</button>
      </div>
      <div class="actions">
        <button id="demoBtn" class="btn ghost">데모 링크</button>
        <span id="statusText" class="status">대기 중</span>
      </div>
    </section>

    <section class="panel result-panel">
      <div class="panel-header">
        <h2 id="summaryTitle">이 제품 사기 전 꼭 봐야 할 단점</h2>
        <p id="resultHint">링크를 넣고 요약을 실행하세요.</p>
      </div>

      <div class="stat-grid">
        <article class="stat-card">
          <p>상품 ID</p>
          <strong id="productId">-</strong>
        </article>
        <article class="stat-card">
          <p>1~2점 리뷰 수</p>
          <strong id="lowCount">0</strong>
        </article>
        <article class="stat-card">
          <p>요약 방식</p>
          <strong id="summaryMode">-</strong>
        </article>
      </div>

      <h3 class="section-title">핵심 단점</h3>
      <ul id="consList" class="cons-list"></ul>

      <h3 class="section-title">근거가 된 1~2점 리뷰</h3>
      <ul id="evidenceList" class="evidence-list"></ul>
    </section>
  </main>

  <script defer src="/main.js"></script>
</body>
</html>
